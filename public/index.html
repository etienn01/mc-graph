<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>MeshCore Graph</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0f1117;
    color: #e0e0e0;
    font-family: 'Segoe UI', monospace;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 18px;
    background: #1a1d27;
    border-bottom: 1px solid #2a2d3a;
    flex-shrink: 0;
  }
  #status-indicator { margin-left: auto; }

  header h1 {
    font-size: 1rem;
    font-weight: 600;
    letter-spacing: .05em;
    color: #7eb8f7;
  }

  #search-wrap {
    position: relative;
  }
  #search-input {
    background: #0f1117;
    border: 1px solid #2a2d3a;
    border-radius: 4px;
    color: #ddd;
    font-size: .8rem;
    padding: 4px 10px;
    width: 200px;
    outline: none;
  }
  #search-input:focus { border-color: #4a5068; }
  #search-results {
    position: absolute;
    top: calc(100% + 4px);
    left: 0;
    width: 100%;
    background: #1a1d27;
    border: 1px solid #2a2d3a;
    border-radius: 4px;
    display: none;
    z-index: 100;
    max-height: 220px;
    overflow-y: auto;
  }
  #search-results.open { display: block; }
  .sr-item {
    padding: 6px 10px;
    cursor: pointer;
    font-size: .78rem;
    color: #ccc;
  }
  .sr-item:hover { background: #252838; }
  .sr-item-sub { font-size: .68rem; color: #555; }

  #toggle-ghosts {
    background: none;
    border: 1px solid #2a2d3a;
    color: #666;
    padding: 4px 10px;
    border-radius: 4px;
    font-size: .75rem;
    cursor: pointer;
    white-space: nowrap;
  }
  #toggle-ghosts.active { border-color: #7eb8f7; color: #7eb8f7; }

  #status-indicator {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: .75rem;
    color: #888;
  }

  #status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #555;
    transition: background .3s;
  }
  #status-dot.connected { background: #4caf50; }
  #status-dot.disconnected { background: #f44336; }

  @keyframes dot-pulse {
    0%   { box-shadow: 0 0 0 0 rgba(76,175,80,.7); }
    100% { box-shadow: 0 0 0 7px rgba(76,175,80,0); }
  }
  #status-dot.pulse { animation: dot-pulse .5s ease-out; }

  main {
    flex: 1;
    display: flex;
    overflow: hidden;
  }

  #graph-container {
    flex: 1;
    position: relative;
    overflow: hidden;
  }

  svg {
    width: 100%;
    height: 100%;
  }

  .link {
    stroke-opacity: 0.8;
    stroke-width: 1.5;
  }

  .node circle {
    stroke-width: 1.5;
    cursor: pointer;
  }

  .node text {
    font-size: 11px;
    fill: #ccc;
    pointer-events: none;
    text-shadow: 0 0 4px #000;
  }

  .link-label {
    font-size: 9px;
    fill: #888;
    pointer-events: none;
  }

  /* Tooltip */
  #tooltip {
    position: absolute;
    background: #1e2130cc;
    border: 1px solid #3a3d50;
    border-radius: 6px;
    padding: 10px 14px;
    font-size: .75rem;
    pointer-events: none;
    display: none;
    max-width: 260px;
    line-height: 1.6;
    backdrop-filter: blur(4px);
  }
  #tooltip .tip-title { font-weight: 700; color: #7eb8f7; margin-bottom: 4px; }
  #tooltip .tip-row { color: #aaa; }
  #tooltip .tip-row span { color: #ddd; }

  /* Detail panel */
  #detail-panel {
    position: relative;
    flex-shrink: 0;
    width: 280px;
    background: #1a1d27;
    border-left: 1px solid #2a2d3a;
    padding: 18px 16px;
    overflow-y: auto;
    display: none;
    font-size: .8rem;
  }
  #detail-panel.open { display: block; }
  #detail-close {
    position: absolute;
    top: 14px; right: 16px;
    cursor: pointer;
    color: #555;
    font-size: 1rem;
    line-height: 1;
  }
  #detail-close:hover { color: #ccc; }
  .dp-title { font-size: 1rem; font-weight: 700; color: #7eb8f7; margin-bottom: 3px; padding-right: 20px; }
  .dp-id { font-size: .68rem; color: #444; margin-bottom: 12px; word-break: break-all; }
  .dp-row { color: #777; margin-bottom: 3px; }
  .dp-row span { color: #ddd; }
  .dp-section { margin-top: 14px; border-top: 1px solid #2a2d3a; padding-top: 12px; }
  .dp-section-title { font-size: .68rem; text-transform: uppercase; letter-spacing: .08em; color: #555; margin-bottom: 10px; }
  .dp-link { margin-bottom: 10px; padding: 8px 10px; background: #0f1117; border-radius: 4px; border: 1px solid #2a2d3a; }
  .dp-link-name { color: #ccc; font-weight: 600; margin-bottom: 5px; }
  .dp-link-row { color: #666; font-size: .75rem; margin-bottom: 2px; }
  .dp-link-row span { color: #bbb; }
  .dp-link[data-neighbor-id] { cursor: pointer; }
  .dp-link[data-neighbor-id]:hover { border-color: #4a4d5a; background: #161820; }

  /* ── Mobile ────────────────────────────────────────────────────────────── */
  @media (max-width: 640px) {
    header h1 { display: none; }

    #search-input { width: 140px; }
    #search-results { width: 260px; }

    #detail-panel {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      width: 100%;
      max-height: 55vh;
      border-left: none;
      border-top: 1px solid #2a2d3a;
      border-radius: 12px 12px 0 0;
      z-index: 20;
      padding: 14px 16px 24px;
    }
    #detail-panel.open { display: block; }

    #detail-panel::before {
      content: '';
      display: block;
      width: 36px; height: 4px;
      background: #3a3d50;
      border-radius: 2px;
      margin: 0 auto 14px;
    }
  }

</style>
</head>
<body>

<header>
  <h1>MeshCore Network Graph</h1>
  <div id="search-wrap">
    <input id="search-input" type="text" placeholder="Search nodes…" autocomplete="off">
    <div id="search-results"></div>
  </div>
  <button id="toggle-ghosts" title="Show/hide nodes with no ADVERT received (unknown nodes)">Unknown: off</button>
  <div id="status-indicator">
    <div id="status-dot"></div>
    <span id="status-text">Connecting…</span>
  </div>
</header>

<main>
  <div id="graph-container">
    <svg id="svg"></svg>
    <div id="tooltip"></div>
  </div>
  <div id="detail-panel">
    <span id="detail-close">✕</span>
    <div id="detail-content"></div>
  </div>
</main>

<script src="/socket.io/socket.io.js"></script>
<script src="https://d3js.org/d3.v7.min.js"></script>
<script>
// ── SNR → colour ─────────────────────────────────────────────────────────────
function snrColor(snr) {
  if (snr == null || isNaN(snr)) return '#444';
  if (snr >= 10) return '#4caf50';
  if (snr >= 5)  return '#8bc34a';
  if (snr >= 0)  return '#ffc107';
  if (snr >= -5) return '#ff9800';
  return '#f44336';
}

// Best SNR of both directions for coloring the link
function edgeBestSnr(d) {
  const vals = [d.snrAB, d.snrBA].filter(v => v != null && !isNaN(v));
  return vals.length ? Math.max(...vals) : null;
}

function modeColor(mode) {
  const m = (mode || '').toLowerCase();
  if (m === 'repeater')   return '#7eb8f7';
  if (m === 'companion')  return '#6fcf97';
  if (m === 'room server') return '#cf6f97';
  if (m === 'sensor')     return '#cfb06f';
  return '#aaa';
}

function relTime(ts) {
  if (!ts) return 'unknown';
  const s = Math.floor((Date.now() - ts) / 1000);
  if (s < 60)    return `${s}s ago`;
  if (s < 3600)  return `${Math.floor(s / 60)}m ago`;
  if (s < 86400) return `${Math.floor(s / 3600)}h ago`;
  return `${Math.floor(s / 86400)}d ago`;
}

// ── D3 setup ─────────────────────────────────────────────────────────────────
const svg = d3.select('#svg');
const container = document.getElementById('graph-container');

let width = container.clientWidth;
let height = container.clientHeight;

const g = svg.append('g');

// Zoom
const zoom = d3.zoom().scaleExtent([0.2, 5]).on('zoom', e => g.attr('transform', e.transform));
svg.call(zoom);

const linkGroup = g.append('g').attr('class', 'links');
const linkLabelAB = g.append('g').attr('class', 'link-labels-ab'); // snrAB near target (B)
const linkLabelBA = g.append('g').attr('class', 'link-labels-ba'); // snrBA near source (A)
const nodeGroup = g.append('g').attr('class', 'nodes');

const simulation = d3.forceSimulation()
  .force('link', d3.forceLink().id(d => d.id).distance(280).strength(0.3))
  .force('charge', d3.forceManyBody().strength(-1800))
  .force('center', d3.forceCenter(width / 2, height / 2).strength(0.03))
  .force('collision', d3.forceCollide(70));

// Keep center force updated on resize
window.addEventListener('resize', () => {
  width = container.clientWidth;
  height = container.clientHeight;
  simulation.force('center', d3.forceCenter(width / 2, height / 2).strength(0.03));
  simulation.alpha(0.1).restart();
});

// Tooltip
const tooltip = document.getElementById('tooltip');

function mk(tag, cls) { const e = document.createElement(tag); if (cls) e.className = cls; return e; }
function mkRow(cls, label, value, color) {
  const d = mk('div', cls);
  d.append(label + ': ');
  const s = mk('span');
  s.textContent = value;
  if (color) s.style.color = color;
  d.appendChild(s);
  return d;
}
const dpRow     = (label, value, color) => mkRow('dp-row',      label, value, color);
const dpLinkRow = (label, value, color) => mkRow('dp-link-row', label, value, color);
const tipRow    = (label, value)        => mkRow('tip-row',     label, value);

function showTooltip(event, node) {
  tooltip.replaceChildren();
  if (node.name) { const t = mk('div', 'tip-title'); t.textContent = node.name; tooltip.appendChild(t); }
  tooltip.appendChild(tipRow('ID', node.id.slice(0, 16) + '…'));
  if (node.mode)     tooltip.appendChild(tipRow('Mode', node.mode));
  if (node.model)    tooltip.appendChild(tipRow('Model', node.model));
  if (node.firmware) tooltip.appendChild(tipRow('FW', node.firmware));
  if (node.radio)    tooltip.appendChild(tipRow('Radio', node.radio));
  if (node.stats) {
    const s = node.stats;
    if (s.battery_mv)          tooltip.appendChild(tipRow('Battery', `${(s.battery_mv/1000).toFixed(2)}V`));
    if (s.last_snr != null)    tooltip.appendChild(tipRow('Last SNR', `${(s.last_snr/4).toFixed(2)} dB`));
    if (s.last_rssi != null)   tooltip.appendChild(tipRow('Last RSSI', `${s.last_rssi} dBm`));
    if (s.noise_floor != null) tooltip.appendChild(tipRow('Noise floor', `${s.noise_floor} dBm`));
  }
  tooltip.style.display = 'block';
  moveTooltip(event);
}

function moveTooltip(event) {
  const x = event.offsetX + 14;
  const y = event.offsetY + 14;
  tooltip.style.left = x + 'px';
  tooltip.style.top  = y + 'px';
}

function hideTooltip() {
  tooltip.style.display = 'none';
}

// ── Graph render ─────────────────────────────────────────────────────────────
let currentNodes = [];
let currentTopoKey = '';

// Preserve positions between updates
const positionCache = new Map();

let showGhosts = false;
function isGhost(n) { return !n.name && !n.mode; }
function visibleNodes() { return showGhosts ? currentGraph.nodes : currentGraph.nodes.filter(n => !isGhost(n)); }

function render(graph) {
  currentGraph = graph;
  if (selectedNodeId) showDetail(selectedNodeId);
  // Merge positions from simulation into cache
  currentNodes.forEach(n => {
    if (n.x != null) positionCache.set(n.id, { x: n.x, y: n.y, vx: n.vx, vy: n.vy });
  });

  // Build new node/edge arrays, restoring cached positions
  const nodeMap = new Map();
  const newNodes = visibleNodes().map(n => {
    const cached = positionCache.get(n.id);
    return { ...n, ...(cached || { x: width / 2 + (Math.random() - .5) * 200, y: height / 2 + (Math.random() - .5) * 200 }) };
  });
  newNodes.forEach(n => nodeMap.set(n.id, n));

  const newEdges = graph.edges
    .filter(e => nodeMap.has(e.a) && nodeMap.has(e.b))
    .map(e => ({ ...e, source: e.a, target: e.b }));

  currentNodes = newNodes;

  // Links
  const link = linkGroup.selectAll('.link').data(newEdges, d => `${d.a}:${d.b}`);
  link.enter().append('line').attr('class', 'link');
  link.exit().remove();
  updateLinkHighlight();

  // Link labels: one near each endpoint (snrAB near target B, snrBA near source A)
  const lab = linkLabelAB.selectAll('.link-label').data(newEdges, d => `${d.a}:${d.b}`);
  lab.enter().append('text').attr('class', 'link-label');
  lab.exit().remove();
  linkLabelAB.selectAll('.link-label').text(d => d.snrAB != null ? `${d.snrAB.toFixed(2)}dB` : '');

  const lba = linkLabelBA.selectAll('.link-label').data(newEdges, d => `${d.a}:${d.b}`);
  lba.enter().append('text').attr('class', 'link-label');
  lba.exit().remove();
  linkLabelBA.selectAll('.link-label').text(d => d.snrBA != null ? `${d.snrBA.toFixed(2)}dB` : '');

  // Nodes
  const node = nodeGroup.selectAll('.node').data(newNodes, d => d.id);

  const nodeEnter = node.enter().append('g').attr('class', 'node')
    .call(d3.drag()
      .on('start', (event, d) => { if (!event.active) simulation.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
      .on('drag',  (event, d) => { d.fx = event.x; d.fy = event.y; })
      .on('end',   (event, d) => { if (!event.active) simulation.alphaTarget(0); d.fx = null; d.fy = null; }))
    .on('mouseover', (event, d) => showTooltip(event, d))
    .on('mousemove', (event) => moveTooltip(event))
    .on('mouseout',  () => hideTooltip())
    .on('click', (event, d) => { event.stopPropagation(); showDetail(d.id, { focus: true }); });

  nodeEnter.append('circle').attr('r', 14);
  nodeEnter.append('text').attr('dy', 26).attr('text-anchor', 'middle');

  const nodeAll = nodeEnter.merge(node);
  nodeAll.select('circle')
    .attr('fill', d => modeColor(d.mode));
  nodeAll.select('text')
    .text(d => d.name || d.shortId);

  node.exit().remove();
  updateSelectedIndicator();

  simulation
    .nodes(newNodes)
    .on('tick', () => {
      linkGroup.selectAll('.link')
        .attr('x1', d => d.source.x).attr('y1', d => d.source.y)
        .attr('x2', d => d.target.x).attr('y2', d => d.target.y);

      // snrAB label near target (B), at 75% along the edge
      linkLabelAB.selectAll('.link-label')
        .attr('x', d => d.source.x + (d.target.x - d.source.x) * 0.75)
        .attr('y', d => d.source.y + (d.target.y - d.source.y) * 0.75);

      // snrBA label near source (A), at 25% along the edge
      linkLabelBA.selectAll('.link-label')
        .attr('x', d => d.source.x + (d.target.x - d.source.x) * 0.25)
        .attr('y', d => d.source.y + (d.target.y - d.source.y) * 0.25);

      nodeGroup.selectAll('.node')
        .attr('transform', d => `translate(${d.x},${d.y})`);
    });

  simulation.force('link').links(newEdges);

  // Only disturb the layout when nodes or edges are added/removed,
  // not on SNR-only or stats-only updates.
  const topoKey = newNodes.map(n => n.id).sort().join(',') + '|' + newEdges.map(e => `${e.a}:${e.b}`).sort().join(',');
  if (topoKey !== currentTopoKey) {
    currentTopoKey = topoKey;
    simulation.alpha(0.3).restart();
  }
}

// ── Detail panel ─────────────────────────────────────────────────────────────
let currentGraph = { nodes: [], edges: [] };
let selectedNodeId = null;

function updateSelectedIndicator() {
  nodeGroup.selectAll('.node').select('circle')
    .attr('stroke', d => d.id === selectedNodeId ? '#7eb8f7' : (d.status === 'online' ? '#fff' : '#444'))
    .attr('stroke-width', d => d.id === selectedNodeId ? 3 : 1.5);
}

function updateLinkHighlight() {
  const sel = selectedNodeId;
  const connected = d => d.a === sel || d.b === sel;
  linkGroup.selectAll('.link')
    .attr('stroke', d => !sel ? '#3a4050' : (connected(d) ? '#7eb8f7' : '#2a2d3a'))
    .attr('stroke-opacity', d => !sel ? 0.8 : (connected(d) ? 1 : 0.3))
    .attr('stroke-width', d => sel && connected(d) ? 2.5 : 1.5);
  linkLabelAB.selectAll('.link-label').attr('display', d => sel && connected(d) ? null : 'none');
  linkLabelBA.selectAll('.link-label').attr('display', d => sel && connected(d) ? null : 'none');
}

function focusNode(nodeId) {
  const node = currentNodes.find(n => n.id === nodeId);
  if (!node || node.x == null) return;

  const neighborIds = new Set(
    currentGraph.edges
      .filter(e => e.a === nodeId || e.b === nodeId)
      .map(e => e.a === nodeId ? e.b : e.a)
  );
  const group = currentNodes.filter(n => n.id === nodeId || neighborIds.has(n.id));

  const panel = document.getElementById('detail-panel');
  const isMobile = window.innerWidth <= 640;
  const panelH = isMobile && panel.classList.contains('open') ? panel.offsetHeight : 0;
  const panelW = !isMobile && panel.classList.contains('open') ? panel.offsetWidth : 0;
  const availW = width - panelW;
  const availH = height - panelH;

  const pad = 80;
  const xs = group.map(n => n.x);
  const ys = group.map(n => n.y);
  const minX = Math.min(...xs) - pad;
  const maxX = Math.max(...xs) + pad;
  const minY = Math.min(...ys) - pad;
  const maxY = Math.max(...ys) + pad;

  const scale = Math.min(availW / (maxX - minX), availH / (maxY - minY), 2);
  const tx = availW / 2 - scale * (minX + maxX) / 2;
  const ty = availH / 2 - scale * (minY + maxY) / 2;

  svg.transition().duration(600).call(
    zoom.transform,
    d3.zoomIdentity.translate(tx, ty).scale(scale)
  );
}

function showDetail(nodeId, { focus = false } = {}) {
  selectedNodeId = nodeId;
  updateSelectedIndicator();
  updateLinkHighlight();

  const node = visibleNodes().find(n => n.id === nodeId);
  if (!node) return;

  const nodeMap = new Map(visibleNodes().map(n => [n.id, n]));
  const links = currentGraph.edges
    .filter(e => e.a === nodeId || e.b === nodeId)
    .sort((a, b) => (b.lastSeen || 0) - (a.lastSeen || 0));

  const content = document.getElementById('detail-content');
  content.replaceChildren();

  const titleEl = mk('div', 'dp-title');
  titleEl.textContent = node.name || node.shortId || nodeId.slice(0, 8);
  content.appendChild(titleEl);

  const idEl = mk('div', 'dp-id');
  idEl.textContent = nodeId;
  content.appendChild(idEl);

  if (node.mode)     content.appendChild(dpRow('Mode', node.mode));
  if (node.model)    content.appendChild(dpRow('Model', node.model));
  if (node.firmware) content.appendChild(dpRow('FW', node.firmware));
  if (node.radio)    content.appendChild(dpRow('Radio', node.radio));
  if (node.firstSeen) content.appendChild(dpRow('First seen', relTime(node.firstSeen)));
  content.appendChild(dpRow('Last seen', relTime(node.lastSeen)));
  if (node.stats) {
    const s = node.stats;
    if (s.battery_mv)          content.appendChild(dpRow('Battery', `${(s.battery_mv / 1000).toFixed(2)} V`));
    if (s.last_snr != null)    content.appendChild(dpRow('Last SNR', `${(s.last_snr / 4).toFixed(2)} dB`));
    if (s.last_rssi != null)   content.appendChild(dpRow('Last RSSI', `${s.last_rssi} dBm`));
    if (s.noise_floor != null) content.appendChild(dpRow('Noise floor', `${s.noise_floor} dBm`));
  }

  if (links.length > 0) {
    const renderLinks = (group, groupTitle) => {
      if (group.length === 0) return;
      const section = mk('div', 'dp-section');
      const sTitle = mk('div', 'dp-section-title');
      sTitle.textContent = `${groupTitle} (${group.length})`;
      section.appendChild(sTitle);
      for (const e of group) {
        const neighborId = e.a === nodeId ? e.b : e.a;
        const neighbor = nodeMap.get(neighborId);
        const isA = e.a === nodeId;
        const snrOut = isA ? e.snrAB : e.snrBA;
        const snrIn  = isA ? e.snrBA : e.snrAB;
        const link = mk('div', 'dp-link');
        link.dataset.neighborId = neighborId;
        const nameEl = mk('div', 'dp-link-name');
        nameEl.textContent = neighbor?.name || neighborId.slice(0, 8);
        link.appendChild(nameEl);
        if (snrOut != null) link.appendChild(dpLinkRow('TX → neighbor', `${snrOut.toFixed(2)} dB`, snrColor(snrOut)));
        if (snrIn  != null) link.appendChild(dpLinkRow('RX ← neighbor', `${snrIn.toFixed(2)} dB`, snrColor(snrIn)));
        link.appendChild(dpLinkRow('Last seen', relTime(e.lastSeen)));
        section.appendChild(link);
      }
      content.appendChild(section);
    };

    const neighborMode = e => nodeMap.get(e.a === nodeId ? e.b : e.a)?.mode?.toLowerCase();
    renderLinks(links.filter(e => neighborMode(e) === 'repeater'),                                                          'Repeaters');
    renderLinks(links.filter(e => neighborMode(e) === 'room server'),                                                       'Room Servers');
    renderLinks(links.filter(e => neighborMode(e) && neighborMode(e) !== 'repeater' && neighborMode(e) !== 'room server'),  'Companions');
    renderLinks(links.filter(e => !neighborMode(e)),                                                                        'Unknown');
  }

  document.getElementById('detail-panel').classList.add('open');
  if (focus) focusNode(nodeId);
}

function closeDetail() {
  document.getElementById('detail-panel').classList.remove('open');
  selectedNodeId = null;
  updateSelectedIndicator();
  updateLinkHighlight();
}

document.getElementById('detail-close').addEventListener('click', closeDetail);
svg.on('click', closeDetail);

document.getElementById('detail-content').addEventListener('click', e => {
  const item = e.target.closest('[data-neighbor-id]');
  if (item) showDetail(item.dataset.neighborId, { focus: true });
});

// ── Search ────────────────────────────────────────────────────────────────────
const searchInput   = document.getElementById('search-input');
const searchResults = document.getElementById('search-results');

searchInput.addEventListener('input', () => {
  const q = searchInput.value.trim().toLowerCase();
  if (!q) { searchResults.classList.remove('open'); return; }
  const matches = visibleNodes()
    .filter(n => (n.name && n.name.toLowerCase().includes(q)) || n.id.toLowerCase().includes(q))
    .sort((a, b) => {
      const aPrefix = a.id.toLowerCase().startsWith(q) ? 0 : 1;
      const bPrefix = b.id.toLowerCase().startsWith(q) ? 0 : 1;
      return aPrefix - bPrefix;
    })
    .slice(0, 10);
  if (matches.length === 0) { searchResults.classList.remove('open'); return; }
  searchResults.replaceChildren(...matches.map(n => {
    const item = mk('div', 'sr-item');
    item.dataset.nodeId = n.id;
    item.append(n.name || n.shortId);
    const sub = mk('div', 'sr-item-sub');
    sub.textContent = n.id.slice(0, 16) + '…';
    item.appendChild(sub);
    return item;
  }));
  searchResults.classList.add('open');
});

searchResults.addEventListener('click', e => {
  const item = e.target.closest('[data-node-id]');
  if (!item) return;
  const nodeId = item.dataset.nodeId;
  searchInput.value = '';
  searchResults.classList.remove('open');
  showDetail(nodeId, { focus: true });
});

searchInput.addEventListener('keydown', e => {
  if (e.key === 'Escape') { searchInput.value = ''; searchResults.classList.remove('open'); }
});

document.addEventListener('click', e => {
  if (!document.getElementById('search-wrap').contains(e.target))
    searchResults.classList.remove('open');
});

const toggleGhostsBtn = document.getElementById('toggle-ghosts');
toggleGhostsBtn.addEventListener('click', () => {
  showGhosts = !showGhosts;
  toggleGhostsBtn.textContent = `Unknown: ${showGhosts ? 'on' : 'off'}`;
  toggleGhostsBtn.classList.toggle('active', showGhosts);
  render(currentGraph);
});

// ── Socket.io ─────────────────────────────────────────────────────────────────
const socket = io();

socket.on('connect', () => {
  document.getElementById('status-dot').className = 'connected';
  document.getElementById('status-text').textContent = 'Live';
});

socket.on('disconnect', () => {
  document.getElementById('status-dot').className = 'disconnected';
  document.getElementById('status-text').textContent = 'Disconnected';
});

socket.on('graph', graph => {
  const dot = document.getElementById('status-dot');
  dot.classList.remove('pulse');
  void dot.offsetWidth;
  dot.classList.add('pulse');
  render(graph);
});
</script>
</body>
